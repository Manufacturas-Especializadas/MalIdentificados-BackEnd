name: Build and deploy ASP.Net Core app to Azure Web App - app-mesa-malidentificados-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_PATH: API/API.csproj

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} \
          --configuration Release \
          --no-build \
          --output ./publish

      # Este paso es para verificar qué se publicó
      - name: Verify publish output
        run: ls -la ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-mesa-malidentificados-prod
          slot-name: Production
          package: ./publish
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_E06C88EEB7674A78A29FE7369E284843 }}
